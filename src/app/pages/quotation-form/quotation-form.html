<div class="p-6 max-w-3xl mx-auto">
  <h1 class="text-2xl font-bold text-gray-800 mb-6">
    {{ isEdit ? 'Edit Quotation' : 'New Quotation' }}
  </h1>

  <div class="bg-white rounded-xl border border-gray-200 p-6 space-y-5">

    <!-- Client Info -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Client Name</label>
        <input [(ngModel)]="clientName" placeholder="e.g. John Doe"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Client Email</label>
        <input [(ngModel)]="clientEmail" placeholder="e.g. john@example.com"
               class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
      </div>
    </div>

    <!-- Status -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">Status</label>
      <select [(ngModel)]="status"
              class="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300">
        <option *ngFor="let s of statuses" [value]="s">{{ s }}</option>
      </select>
    </div>

    <!-- Line Items -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-2">Items</label>
      <div class="space-y-2">
        <div *ngFor="let item of items; let i = index"
             class="grid grid-cols-12 gap-2 items-center">
          <input [(ngModel)]="item.description" placeholder="Description"
                 class="col-span-6 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <input [(ngModel)]="item.quantity" type="number" min="1" placeholder="Qty"
                 class="col-span-2 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <input [(ngModel)]="item.unitPrice" type="number" min="0" placeholder="Price"
                 class="col-span-3 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
          <button (click)="removeItem(i)" *ngIf="items.length > 1"
                  class="col-span-1 text-red-400 hover:text-red-600 text-center">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>
      <button (click)="addItem()"
              class="mt-3 text-sm text-indigo-600 hover:underline">
        <i class="fas fa-plus mr-1"></i>Add item
      </button>
    </div>

    <!-- Total -->
    <div class="bg-indigo-50 rounded-lg px-4 py-3 flex justify-between items-center">
      <span class="text-sm font-medium text-indigo-600">Total Amount</span>
      <span class="text-xl font-bold text-indigo-700">${{ total.toFixed(2) }}</span>
    </div>

    <!-- Notes -->
    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">Notes (optional)</label>
      <textarea [(ngModel)]="notes" rows="3" placeholder="Any additional notes..."
                class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"></textarea>
    </div>

    <!-- Actions -->
    <div class="flex gap-3 pt-2">
      <button (click)="submit()"
              class="bg-indigo-600 text-white px-6 py-2 rounded-lg text-sm hover:bg-indigo-700 transition-colors">
        <i class="fas fa-save mr-1"></i>{{ isEdit ? 'Update' : 'Save' }} Quote
      </button>
      <a routerLink="/quotations"
         class="border border-gray-200 text-gray-500 px-5 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Cancel
      </a>
    </div>
  </div>
</div>
